name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io

jobs:
  # ── CI: Vet, Test, and Coverage (Matrix Testing) ────────────────────────────
  ci:
    name: CI - Go ${{ matrix.go-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.21", "1.22", "1.23"]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taskflow
          POSTGRES_PASSWORD: taskflow_secret
          POSTGRES_DB: taskflow
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Verify Go version
        run: go version

      - name: go vet
        run: go vet ./...

      - name: Unit test + race detector
        run: go test -race ./... -timeout 30s

      - name: Build binary (compile check)
        run: |
          echo "Building binary to verify compilation..."
          CGO_ENABLED=0 GOOS=linux go build -ldflags="-w -s" -o /tmp/taskflow-api ./cmd/server
          echo "Binary compiled successfully"

      - name: Check Go 1.21 compatibility note
        if: matrix.go-version == '1.21'
        run: |
          echo "Note: Go 1.21 uses legacy routing (no method matching)"
          echo "Pattern routing (GET /path) is a Go 1.22+ feature"
          echo "This code compiles but routing behavior differs from 1.22+"

      - name: Integration test
        env:
          DATABASE_URL: postgres://taskflow:taskflow_secret@localhost:5432/taskflow?sslmode=disable
        run: go test -tags=integration -race ./... -timeout 60s

      - name: Coverage check
        run: |
          go test ./... -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 75" | bc -l) )); then
            echo "Coverage $COVERAGE% is below 75% (Rubric Requirement)"
            exit 1
          fi
          echo "Coverage $COVERAGE% meets requirement"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-go-${{ matrix.go-version }}
          path: coverage.out

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux go build -ldflags="-w -s" -o bin/taskflow-api ./cmd/server

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: taskflow-api-binary-go-${{ matrix.go-version }}
          path: bin/taskflow-api

  # ── CD: Build, Push, & Smoke Test (Post-Deployment Check) ────────────────────
  cd:
    name: CD - Docker Build & Push
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name (lowercase)
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "image_name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:sha-${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image tag
        run: echo "Image pushed to ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:sha-${{ steps.vars.outputs.sha_short }}"

      # ── Skenario 4: Deployment Smoke Test Lokal via Container ────────────────
      - name: Pull and run image for Smoke Test
        env:
          DATABASE_URL: postgres://taskflow:taskflow_secret@localhost:5432/taskflow?sslmode=disable
        run: |
          docker pull ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:sha-${{ steps.vars.outputs.sha_short }}
          docker run -d --rm \
            --name taskflow-api \
            -p 8080:8080 \
            -e DATABASE_URL="$DATABASE_URL" \
            -e PORT=8080 \
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:sha-${{ steps.vars.outputs.sha_short }}

      - name: Wait for startup
        run: |
          echo "Waiting for server to be ready..."
          sleep 10
          echo "Checking container status..."
          docker ps -a
          echo "Container logs:"
          docker logs taskflow-api || true

      - name: Smoke test /health
        run: |
          echo "Testing /health endpoint..."
          curl -v http://localhost:8080/health || (echo "❌ Health check failed"; exit 1)
          echo "/health OK"

      - name: Smoke test /api/v1/stats
        run: |
          echo "Testing /api/v1/stats endpoint..."
          curl -v http://localhost:8080/api/v1/stats || (echo "❌ Stats endpoint failed"; exit 1)
          echo "/api/v1/stats OK"

      - name: Cleanup container
        if: always()
        run: |
          echo "Container logs at cleanup:"
          docker logs taskflow-api || true
          docker stop taskflow-api || true
