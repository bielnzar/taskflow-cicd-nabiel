name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io

jobs:
  # ── CI: Vet, Test, and Coverage (Matrix Testing) ────────────────────────────
  ci:
    name: CI - Go ${{ matrix.go-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.21", "1.22", "1.23"]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taskflow
          POSTGRES_PASSWORD: taskflow_secret
          POSTGRES_DB: taskflow
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Verify Go version
        run: go version

      - name: go vet
        run: go vet ./...

      - name: Unit test + race detector
        run: go test -race ./... -timeout 30s

      - name: Build binary (compile check)
        run: |
          echo "Building binary to verify compilation..."
          CGO_ENABLED=0 GOOS=linux go build -ldflags="-w -s" -o /tmp/taskflow-api ./cmd/server
          echo "Binary compiled successfully"

      - name: Check Go 1.21 compatibility note
        if: matrix.go-version == '1.21'
        run: |
          echo "Checking if pattern routing is supported in Go 1.21..."
          go build -o /dev/null ./cmd/server 2>&1 | grep -q "pattern" && echo "Pattern routing not supported (expected)" || echo "No pattern routing errors"
          echo "ℹ️ Note: Go 1.21 uses legacy routing (no method matching)"
          echo "Pattern routing (GET /path) is a Go 1.22+ feature"
          echo "This code compiles but routing behavior differs from 1.22+"

      - name: Integration test
        env:
          DATABASE_URL: postgres://taskflow:taskflow_secret@localhost:5432/taskflow?sslmode=disable
        run: go test -tags=integration -race ./... -timeout 60s

      - name: Coverage check
        run: |
          go test ./... -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 75" | bc -l) )); then
            echo "Coverage $COVERAGE% is below 75% (Rubric Requirement)"
            exit 1
          fi
          echo "Coverage $COVERAGE% meets requirement"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-go-${{ matrix.go-version }}
          path: coverage.out

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux go build -ldflags="-w -s" -o bin/taskflow-api ./cmd/server

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: taskflow-api-binary-go-${{ matrix.go-version }}
          path: bin/taskflow-api

  # Security: SCA and SAST reports
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install security tools
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run dependency vulnerability scan
        id: govulncheck
        continue-on-error: true
        run: govulncheck -json ./... > govulncheck-report.json

      - name: Run static application security scan
        id: gosec
        continue-on-error: true
        run: gosec -severity high -confidence medium -fmt json -out gosec-report.json ./...

      - name: Upload govulncheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: govulncheck-report
          path: govulncheck-report.json

      - name: Upload gosec report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gosec-report
          path: gosec-report.json

      - name: Fail on security findings
        if: steps.govulncheck.outcome == 'failure' || steps.gosec.outcome == 'failure'
        run: |
          echo "Security scan found blocking findings. Check uploaded reports."
          exit 1

  # ── CD: Build, Push, & Smoke Test (Post-Deployment Check) ────────────────────
  cd:
    name: CD - Docker Build & Push
    runs-on: ubuntu-latest
    needs: [ci, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taskflow
          POSTGRES_PASSWORD: taskflow_secret
          POSTGRES_DB: taskflow
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name (lowercase)
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "image_name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:sha-${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image tag
        run: echo "Image pushed to ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:sha-${{ steps.vars.outputs.sha_short }}"

      # ── Skenario 4: Deployment Smoke Test Lokal via Container ────────────────
      - name: Pull and run image for Smoke Test
        env:
          DATABASE_URL: postgres://taskflow:taskflow_secret@localhost:5432/taskflow?sslmode=disable
        run: |
          echo "Pulling image..."
          docker pull ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:sha-${{ steps.vars.outputs.sha_short }}
          echo "Starting container..."
          # Run WITHOUT --rm so we can inspect logs if it crashes
          docker run -d \
            --name taskflow-api \
            --network host \
            -e DATABASE_URL="$DATABASE_URL" \
            -e PORT=8080 \
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:sha-${{ steps.vars.outputs.sha_short }}
          echo "Container started, waiting 2s..."
          sleep 2
          echo "Container status:"
          docker ps -a
          echo "Container logs (first 50 lines):"
          docker logs taskflow-api 2>&1 | head -50 || true

      - name: Wait for startup
        run: |
          echo "Waiting for server to be ready (retrying for 30s)..."
          for i in {1..30}; do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Server is ready after ${i} seconds"
              exit 0
            fi
            echo "Attempt $i/30 - not ready yet..."
            
            # Check if container is still running
            if ! docker ps | grep -q taskflow-api; then
              echo "Container crashed! Logs:"
              docker logs taskflow-api 2>&1 | tail -30 || true
              exit 1
            fi
            
            docker logs taskflow-api --tail 3 2>&1 || true
            sleep 1
          done
          echo "Server failed to start within 30 seconds"
          echo "Final container logs:"
          docker logs taskflow-api 2>&1 || true
          echo "Container status:"
          docker ps -a
          exit 1

      - name: Smoke test /health
        run: |
          echo "Testing /health endpoint..."
          curl -sf http://localhost:8080/health || (echo "Health check failed"; exit 1)
          echo "/health OK"

      - name: Smoke test /api/v1/stats
        run: |
          echo "Testing /api/v1/stats endpoint..."
          curl -sf http://localhost:8080/api/v1/stats || (echo "Stats endpoint failed"; exit 1)
          echo "/api/v1/stats OK"

      - name: Cleanup container
        if: always()
        run: |
          echo "Container logs at cleanup:"
          docker logs taskflow-api 2>&1 || true
          docker stop taskflow-api 2>&1 || true
          docker rm taskflow-api 2>&1 || true

  # ── Tag Stable: only after all CI + CD + smoke tests pass ──────────────────
  tag-stable:
    name: Tag Stable
    runs-on: ubuntu-latest
    needs: [cd]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.cd.result == 'success'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name (lowercase)
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "image_name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Tag and push stable
        run: |
          docker pull ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:sha-${{ steps.vars.outputs.sha_short }}
          docker tag ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:sha-${{ steps.vars.outputs.sha_short }} \
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:stable
          docker push ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:stable
          echo "✅ Tagged sha-${{ steps.vars.outputs.sha_short }} as stable"

  # ── Notification: Skenario 4 (Person 5) ──────────────────────────────────────
  notify:
    name: Telegram Notification
    runs-on: ubuntu-latest
    needs: [ci, security, cd, tag-stable]
    if: always() # Pastikan notifikasi selalu berjalan meskipun job sebelumnya gagal

    steps:
      - name: Notify Success
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        run: |
          TIME=$(TZ='Asia/Jakarta' date +'%Y-%m-%d %H:%M:%S WIB')
          curl -s -X POST -H 'Content-Type: application/json' \
            -d '{"chat_id": "${{ secrets.TELEGRAM_TO }}", "parse_mode": "Markdown", "text": "✅ *TaskFlow Pipeline SUCCESS*\n\n*Waktu:* '"$TIME"'\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ github.sha }}\n\n*URL:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
            https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage

      - name: Notify Failure
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          TIME=$(TZ='Asia/Jakarta' date +'%Y-%m-%d %H:%M:%S WIB')
          curl -s -X POST -H 'Content-Type: application/json' \
            -d '{"chat_id": "${{ secrets.TELEGRAM_TO }}", "parse_mode": "Markdown", "text": "❌ *TaskFlow Pipeline FAILED*\n\n*Waktu:* '"$TIME"'\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ github.sha }}\n\n*URL:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
            https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage
